{{ define "main" }}
<article class="home">
  <div class="content">
    {{ .Content }}
  </div>
  <section class="recent">
    <h2>Recent posts</h2>
    <ul class="post-list">
      {{- range where site.RegularPages "Section" "posts" | first 10 -}}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
      </li>
      {{- end -}}
    </ul>
    <p class="more"><a href="{{ "posts/" | relURL }}">All posts →</a></p>
  </section>
</article>
{{ end }}
