{{ define "main" }}
<article class="list">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{- with .Content -}}
    <div class="page-intro">{{ . }}</div>
    {{- end -}}
  </header>
  <ul class="post-list">
    {{- range .Pages.ByDate.Reverse -}}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
    </li>
    {{- end -}}
  </ul>
</article>
{{ end }}
