{{ define "main" }}
<article class="single">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{- if not .Date.IsZero -}}
    <p class="meta"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time></p>
    {{- end -}}
  </header>
  <div class="content">
    {{ .Content }}
  </div>
</article>
{{ end }}
